version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bookstore_agents}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  voice-worker:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    command: ["node", "dist/modules/realtime-voice/workers/voice-task.worker.js"]

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      PORT: 3001
      TRUST_PROXY: "true"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      REALTIME_MULTI_AGENT_ENABLED: ${REALTIME_MULTI_AGENT_ENABLED:-true}
    expose:
      - "3001"

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - ../../.env
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_etc:/etc/letsencrypt

  certbot:
    image: certbot/certbot:latest
    profiles: ["ssl"]
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_etc:/etc/letsencrypt
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_etc:

