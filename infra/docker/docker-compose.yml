# Optional local Postgres for order-lookup-voice-agent session persistence.
# Run from repo root: docker compose -f infra/docker/docker-compose.yml up -d
#
# Then in services/order-lookup-voice-agent/.env:
#   DATABASE_URL=postgresql://postgres:postgres@localhost:5432/voice_agent_db

services:
  postgres:
    image: postgres:16-alpine
    container_name: voice_agent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voice_agent_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d voice_agent_db"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
