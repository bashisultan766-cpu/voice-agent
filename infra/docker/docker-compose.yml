# Local development — Redis for twilio-voice-agent
# Run from repo root: docker compose -f infra/docker/docker-compose.yml up -d

services:
  redis:
    image: redis:7-alpine
    container_name: voice_agent_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
