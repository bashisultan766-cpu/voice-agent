apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voice-agent-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: voice-agent-api
spec:
  ingressClassName: nginx
  rules:
    - host: voice.example.com
      http:
        paths:
          - path: /api/twilio
            pathType: Prefix
            backend:
              service:
                name: voice-agent-api
                port:
                  number: 3001
          - path: /api/realtime-voice/ws
            pathType: Prefix
            backend:
              service:
                name: voice-agent-api
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: voice-agent-web
                port:
                  number: 3000
