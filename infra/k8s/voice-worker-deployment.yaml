apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-background-worker
  labels:
    app: voice-background-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voice-background-worker
  template:
    metadata:
      labels:
        app: voice-background-worker
    spec:
      containers:
        - name: worker
          image: voice-agent-api:latest
          command: ["node", "dist/modules/realtime-voice/workers/voice-task.worker.js"]
          env:
            - name: NODE_ENV
              value: production
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: voice-agent-secrets
                  key: redis-url
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
