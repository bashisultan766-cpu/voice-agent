# Nginx — Twilio ConversationRelay voice agent
# Install:
#   sudo cp infra/nginx/voice-agent.mailcallcommunication.com.conf /etc/nginx/sites-available/voice-agent.conf
#   sudo ln -sf /etc/nginx/sites-available/voice-agent.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Internal port:
#   twilio-voice-agent (FastAPI) → 127.0.0.1:8001

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream twilio_voice_agent {
  server 127.0.0.1:8001;
  keepalive 16;
  # For multiple backends, enable sticky WebSocket affinity:
  # ip_hash;
}

server {
  listen 80;
  server_name agent.mailcallcommunication.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name agent.mailcallcommunication.com;

  ssl_certificate /etc/letsencrypt/live/agent.mailcallcommunication.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/agent.mailcallcommunication.com/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  # Twilio ConversationRelay WebSocket (long timeouts)
  location /voice/twilio/ws {
    proxy_pass http://twilio_voice_agent;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
  }

  # Twilio inbound voice webhook
  location /voice/twilio/inbound {
    proxy_pass http://twilio_voice_agent;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  # Health check (short timeout — used by load balancers / deploy gates)
  location /health {
    proxy_pass http://twilio_voice_agent;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 10s;
  }
}
