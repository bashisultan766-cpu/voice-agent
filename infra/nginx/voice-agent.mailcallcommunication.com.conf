# Nginx — PM2/systemd on VPS (agent.mailcallcommunication.com)
# Install:
#   sudo cp infra/nginx/voice-agent.mailcallcommunication.com.conf /etc/nginx/sites-available/voice-agent.conf
#   sudo ln -sf /etc/nginx/sites-available/voice-agent.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Internal ports:
#   Next.js  → 127.0.0.1:3000
#   Nest API → 127.0.0.1:3001  (global prefix /api)

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream voice_web {
  server 127.0.0.1:3000;
  keepalive 16;
}

upstream voice_api {
  server 127.0.0.1:3001;
  keepalive 16;
}

server {
  listen 80;
  server_name agent.mailcallcommunication.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name agent.mailcallcommunication.com;

  ssl_certificate /etc/letsencrypt/live/agent.mailcallcommunication.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/agent.mailcallcommunication.com/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  # Next.js auth routes — set/clear httpOnly session cookie (must not go to Nest only)
  location ~ ^/api/auth/(login|register|logout|session-sync)$ {
    proxy_pass http://voice_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  # API (Nest) — MUST NOT use proxy_pass ...3001/; (trailing slash strips /api/)
  location /api/ {
    proxy_pass http://voice_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400;
  }

  # Frontend (Next.js) — pages and static assets
  location / {
    proxy_pass http://voice_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_cache_bypass $http_upgrade;
  }
}
