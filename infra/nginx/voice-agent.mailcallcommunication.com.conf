# Nginx — dual voice agents (production)
# Bookstore:  /conversationBrain/*     → 127.0.0.1:8001
# Mail Call:  /api/voice/mailcall/*     → 127.0.0.1:8010

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream order_lookup_voice_agent {
  server 127.0.0.1:8001;
  keepalive 16;
}

upstream mailcall_voice_agent {
  server 127.0.0.1:8010;
  keepalive 16;
}

server {
  listen 80;
  server_name agent.mailcallcommunication.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name agent.mailcallcommunication.com;

  ssl_certificate /etc/letsencrypt/live/agent.mailcallcommunication.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/agent.mailcallcommunication.com/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  # ---------- SureShot Bookstore (unchanged) ----------
  location /conversationBrain/ws {
    proxy_pass http://order_lookup_voice_agent;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
  }

  location /conversationBrain/inbound {
    proxy_pass http://order_lookup_voice_agent;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location /conversationBrain/relay-action {
    proxy_pass http://order_lookup_voice_agent;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location /health {
    proxy_pass http://order_lookup_voice_agent;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # ---------- Mail Call Communication Newspaper ----------
  location /api/voice/mailcall/ws {
    proxy_pass http://mailcall_voice_agent;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
  }

  location /api/voice/mailcall/ {
    proxy_pass http://mailcall_voice_agent;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
  }
}
