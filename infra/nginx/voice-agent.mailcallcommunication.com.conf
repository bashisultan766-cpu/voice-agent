# Nginx — SureShot Books multi-service voice stack
# Install:
#   sudo cp infra/nginx/voice-agent.mailcallcommunication.com.conf /etc/nginx/sites-available/voice-agent.conf
#   sudo ln -sf /etc/nginx/sites-available/voice-agent.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Ports:
#   voice-router (Twilio webhook)     → 127.0.0.1:8000
#   twilio-voice-agent (main commerce) → 127.0.0.1:8001
#   order-lookup-voice-agent           → 127.0.0.1:8002

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream voice_router {
  server 127.0.0.1:8000;
  keepalive 8;
}

upstream twilio_voice_agent {
  server 127.0.0.1:8001;
  keepalive 16;
}

upstream order_lookup_agent {
  server 127.0.0.1:8002;
  keepalive 8;
}

server {
  listen 80;
  server_name agent.mailcallcommunication.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name agent.mailcallcommunication.com;

  ssl_certificate /etc/letsencrypt/live/agent.mailcallcommunication.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/agent.mailcallcommunication.com/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  # Twilio webhook — original project URL (routes to voice-router)
  location = /voice/twilio/inbound {
    proxy_pass http://voice_router;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  # Internal routing callbacks (gather / forward / decide)
  location /voice/twilio/routing/ {
    proxy_pass http://voice_router;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  # Order lookup agent (WebSocket + relay)
  location /voice/order/ {
    proxy_pass http://order_lookup_agent;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
  }

  # Main commerce agent — WS, relay-action, internal agent inbound
  location /voice/twilio/ws {
    proxy_pass http://twilio_voice_agent;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_buffering off;
  }

  location /voice/twilio/relay-action {
    proxy_pass http://twilio_voice_agent;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location /voice/twilio/agent/ {
    proxy_pass http://twilio_voice_agent;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  # Health checks
  location /health {
    proxy_pass http://twilio_voice_agent;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
}
