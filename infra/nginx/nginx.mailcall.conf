# Mail Call Communication Newspaper — Nginx reverse proxy (port 8010)
# -----------------------------------------------------------------------------
# Safe to run alongside Bookstore routes (/conversationBrain → :8001).
#
# Production: prefer the merged site file
#   infra/nginx/voice-agent.mailcallcommunication.com.conf
#   (deploy.sh copies that to sites-available)
#
# Standalone paste: put `upstream` in http{} (or this file under conf.d),
# and the `location` blocks inside the HTTPS server { } for the voice host.
# Requires the existing map $http_upgrade $connection_upgrade { ... } from the
# Bookstore site config (already present in the merged file).
# -----------------------------------------------------------------------------

upstream mailcall_voice_agent {
  server 127.0.0.1:8010;
  keepalive 16;
}

# ConversationRelay WebSocket → Express on :8010
location /api/voice/mailcall/ws {
  proxy_pass http://mailcall_voice_agent;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
  proxy_read_timeout 3600;
  proxy_send_timeout 3600;
  proxy_buffering off;
}

# Inbound Twilio webhook, /turn harness, /health under the same prefix
location /api/voice/mailcall/ {
  proxy_pass http://mailcall_voice_agent;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;
  proxy_read_timeout 3600;
  proxy_send_timeout 3600;
}
