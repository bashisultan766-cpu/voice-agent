name: CI

on:
  push:
    branches: [main, develop, production-ready, cleanup/**]
  pull_request:
    branches: [main, develop, production-ready]

jobs:
  order-lookup-voice-agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/order-lookup-voice-agent
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/order-lookup-voice-agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck / build
        run: npm run build

      - name: Run tests
        run: npm test
