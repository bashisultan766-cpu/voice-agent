[pytest]
asyncio_mode = auto
testpaths = app/tests
pythonpath = .
markers =
    unit: fast deterministic tests with no external calls
    integration: integration tests with mocked external systems
    shopify_live: tests that require live Shopify API/network (excluded from CI by default)
    twilio_live: tests that require live Twilio credentials/network
    resend_live: tests that require live Resend email API
    slow: long-running tests (>10s expected)
    release_gate: required for release gate deterministic checks
