version: "3.9"

services:
  voice-agent:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./audio_cache:/app/audio_cache
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Internal Docker network only — do not bind host :6379 (conflicts with host Redis/PM2).
    expose:
      - "6379"
    command: redis-server --save "" --appendonly no
    restart: unless-stopped
